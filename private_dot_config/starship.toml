"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
scan_timeout = 50
command_timeout = 1000
follow_symlinks = true

format = '$character$directory'
# right_format = '$terraform$c$zig$odin$golang$rust$ruby$python${custom.hugo}([\[](#49443C)$git_state$git_status$git_metrics$git_branch$git_commit[\]](#49443C))$battery'

right_format = """
$kubernetes\
$git_branch\
$git_commit\
$git_state\
$git_status\
$hg_branch\
$pijul_channel\
$docker_context\
$package\
$c\
$cmake\
$dotnet\
$golang\
$helm\
$java\
$kotlin\
$lua\
$nim\
$nodejs\
$perl\
$php\
$python\
$rust\
$scala\
$swift\
$terraform\
$conda\
$meson\
$memory_usage\
$aws\
$gcloud\
$custom\
$status\
$os\
$battery\
$time"""

palette = "kanagawa_dragon"

[character]
success_symbol = "[[ůįĄõ](green) ‚ěú](yellow)"
error_symbol = "[[ůįĄõ](red) ‚ěú](yellow)"

[directory]
truncation_length = 8
read_only = " ůįĆĺ"
truncation_symbol = '‚Ä¶/'
style = 'bold purple'

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
rebase = '[rebasing](bold red)'
merge = '[merging](bold brightYellow)'
revert = '[reverting](bold blue)'
cherry_pick = '[picking](bold brightRed)'
bisect = '[bisecting](bold brightRed)'
am = '[applying](bold green)'
am_or_rebase = '[applying/rebasing](bold brightYellow)'

[git_status]
# format = '($all_status$ahead_behind )'
format = "([‚é™$ahead_behind$staged$modified$untracked$renamed$deleted$conflicted$stashed‚é•]($style))"
style = '8'
up_to_date = '[Óā†](brightCyan)'
untracked = '[.](surface1)'
conflicted = '[#](red)'
ahead = '[‚á°‚Ēā[${count}](bold white)‚Ēā](green)'
behind = '[‚á£‚Ēā[${count}](bold white)‚Ēā](yellow)'
diverged = '[‚áē ‚Ėī‚Ē§[${ahead_count}](regular white)‚Ēā‚ĖŅ‚Ē§[${behind_count}](regular white)‚Ēā](brightRed)'
stashed = '[^](yellow)'
modified = '[*](cyan)'
staged = '[+‚Ē§[$count](bold white)‚Ēā](blue)'
renamed = '[¬Ľ](brightYellow)'
deleted = '[x](red)'

[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style)'
symbol = ''
style = 'bold purple'
truncation_length = 11
truncation_symbol = '‚čĮ'
ignore_branches = []

[git_commit]
format = ' [$hash$tag]($style)'
style = '8'
only_detached = false
commit_hash_length = 6
tag_symbol = ''

[git_metrics]
disabled = false
added_style = 'surface0'
deleted_style = 'red'
format = '([+$added]($added_style))([-$deleted]($deleted_style)) '

[lua]
format = " [lua](italic) [${symbol}${version}]($style)"
version_format = "${raw}"
symbol = "‚®Ä "
style = "bold brightYellow"

[nodejs]
format = " [node](italic) [‚óę ($version)](bold green)"
version_format = "${raw}"
detect_files = ["package-lock.json", "yarn.lock"]
detect_folders = ["node_modules"]
detect_extensions = []

[golang]
format = '[$symbol($version )]($style)'
style = 'cyan'
symbol = 'Óėß '

[python]
format = '[$symbol($version )]($style)'
style = 'green'
symbol = 'Óúľ '

[rust]
format = '[$symbol($version )]($style)'
style = 'yellow'
symbol = 'Óě® '

[terraform]
format = '[$symbol$workspace]($style)'
style = 'purple'
symbol = 'Óöö '

[docker_context]
symbol = "Óěį "
format = " docker [$symbol$context]($style)"

[custom.hugo]
format = '[$symbol($output )]($style)'
style = 'red'
symbol = 'Óüĺ '
command = "hugo version | cut -d ' ' -f2 | cut -d '+' -f1"
when = "test -f $(git rev-parse --show-toplevel)/config/_default/config.*"
require_repo = true

[os]
format = " [$symbol]($style)"
style = "bold blue"
disabled = false

[os.symbols]
Windows = "ůįć≤"
Ubuntu = "ůįēą"
SUSE = "ÔĆĒ"
Raspbian = "ůįźŅ"
Mint = "ůį£≠"
Macos = "ÓúĎ"
Manjaro = "ÔĆí"
Linux = "ůįĆĹ"
Gentoo = "ůį£®"
Fedora = "ůį£õ"
Alpine = "ÔĆÄ"
Amazon = "ÔČį"
Android = "Óúé"
Arch = "ůį£á"
Artix = "ůį£á"
CentOS = "ÔĆĄ"
Debian = "ůį£ö"
Redhat = "ůĪĄõ"
RedHatEnterprise = "ůĪĄõ"

[palettes.kanagawa_dragon]
red = "#c4746e"
purple = "#a292a3"
brightRed = "#e46876"
yellow = "#E6C384"
brightYellow = "#c4b28a"
green = "#87a987"
brightCyan = "#7aa89f"
cyan = "#8ea4a2"
blue = "#7FB4CA"
surface1 = "#45475a"
surface0 = "#313244"
white = "#c5c9c5"
