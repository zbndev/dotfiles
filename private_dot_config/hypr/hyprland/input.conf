input {
    kb_layout = us, ru
    numlock_by_default = false
    repeat_delay = 250
    repeat_rate = 35
    kb_options = grp:alt_shift_toggle

    focus_on_close = 1

    touchpad {
        natural_scroll = true
        disable_while_typing = $touchpadDisableTyping
        scroll_factor = $touchpadScrollFactor
    }
}

binds {
    scroll_event_delay = 0
}

cursor {
    hotspot_padding = 1
}

